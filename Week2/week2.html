<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title> Week 2 JavaScript Lab</title>

    </head>
    <body>
        <h1> Week 2 | JavaScript Lab</h1>
        <span id="message"></span>
        <h2>Button Clicker</h2>
        <h3 id="output"></h3>
        <input type="button" value="Click Me!!" id="btn">
        <input type="button" value="Clear clicks" id="btn-reset">
        <!-- Example Javascript -->
         <script>
            var name = prompt("What is your name?");
            var firstNumber = prompt("What is your first number?");
             var secondNumber = prompt("What is your second number?");
             var message = `Hello ${name}! How are you today?${Number(firstNumber) + Number(secondNumber) }`;
            alert(message);
            var spamMessage = document.getElementById("message");
            spamMessage.innerHTML = message;
            
            //Clicker Game Code
            var clickerButton = document.querySelector("#btn");
            var clearButton = document.querySelector("#btn-reset");
            var clickerOutput = document.querySelector("#output");
            var clicks = 0;
            var clickByAmount = 1;

            //how an event handler works
            clickerButton.addEventListener("click", function(){
                //increase number of clicks
                  clicks += clickByAmount;
            displayClickerScore(clicks);
                if(clicks == 30){
                    alert("Congratulations you made it to 30 clicks!");
                }
              
            });

            clearButton.addEventListener("clicks", function(){
                clicks = 0;
               displayClickerScore(clicks);

            })

            function displayClickerScore(clicks){
                 clickerOutput.innerHTML = clicks

            }
        
         
         </script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Week 3 Drawing on Canvas lab</title>
        <meta charset="UTF-8"> 
    </head>
    <body>
        <h1>Drawing on Canvas Example</h1>
        <canvas id="canvas" width="800" height="600" style ="border: 1px solid black;"></canvas>
        <!--indocument javascript-->
        <script>
            //These variables are used to set up the canvas
            var canvas = document.getElementById("canvas");
            var ctx = canvas.getContext('2d');
            

            ctx.fillStyle = "red";
            //Draw a rectangle
            ctx.fillRect(20,20, 50,100);

            ctx.fillStyle = "#0587f0";
            ctx.fillRect(80,20,50,100);
            

            //outlinebox
            ctx.strokeStyle = "orange";
            ctx.strokeRect(140,20,50,100);

            ctx.strokeStyle = "purple"
            ctx.strokeRect(200,20,50,100);

            //Let's Draw a Circle
            ctx.strokeStyle = "green"
            ctx.beginPath();
            //All commands for drawing the Circle will go between here
            ctx.arc(50, 200, 20, 0, 2*Math.PI)
            ctx.stroke()

            //circle 2
            ctx.strokeStyle = "red"
            ctx.beginPath();
            //All commands for drawing the circle will go between here
            ctx.arc(100, 200, 20, 0, 2*Math.PI)
            ctx.stroke();

            //Circle 3 Filled
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            //All the commands for drawing the circle will go in between here'
            ctx.arc(150,200,20,0,2*Math.PI);
            ctx.fill();
            ctx.stroke();

            //Circle 4 Filled with an outline
            ctx.strokeStyle = "green"
            ctx.fillStyle = "black"
            ctx.lineWidth = 2.0;
            ctx.beginPath();
            //All the commands for draing the circle will go in between here 
            ctx.arc(200, 200, 20, 0, 2*Math.PI);
            ctx.fill();
            ctx.stroke();
            
            //Let's Draw some custom shapes
            ctx.lineWidth = 1.0;
            ctx.beginPath();
            ctx.moveTo(50,300);
            ctx.lineTo(75,350);
            ctx.lineTo(25,350);
            ctx.lineTo(50,300);
            ctx.stroke();
            //Triangle 2 
            ctx.strokeStyle = "purple"
            ctx.beginPath();
            ctx.moveTo(150,300);
            ctx.lineTo(175,300);
            ctx.lineTo(125,350);
            ctx.lineTo(150,300);
            ctx.stroke();
            //Triangle 3 
            ctx.fillStyle="purple"
            ctx.beginPath();
            ctx.moveTo(250,300);
            ctx.lineTo(275,350);
            ctx.lineTo(225,350);
            ctx.lineTo(250,300);
            ctx.fill();

            
        </script>
    </body>
</html>

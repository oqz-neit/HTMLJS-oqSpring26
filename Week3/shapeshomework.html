<!DOCTYPE html>
<html lang>
    <title> Shapes Excersise</title>
    <meta charset="UTF-8">
    <head>
        <body>
            <h1>Shapes Homework</h1>
         <canvas id="canvas" width="800" height="800" style ="border: 5 px solid black;"></canvas> 
         <script>
            var myCanvas = document.getElementById("myCanvas")
            var ctx = canvas.getContext("2d")

            //1.Square
            //
            ctx.fillStyle = "yellow"
            ctx.strokeStyle = "black"
            ctx.fillRect(85, 301, 120, 120);
            ctx.strokeRect(85, 301, 120 ,120);
           
            //2.circle
            ctx.strokeStyle = "red"
            ctx.fillStyle = "yellow"
            ctx.beginPath();
            ctx.arc(385, 440, 80, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
            
            //3. line
            ctx.beginPath();
            ctx.moveTo(85,682);
            ctx.lineTo(278,549);
            ctx.strokeStyle = "255,0,0"
            ctx.stroke();
            
            
            //4.pentagon
            ctx.beginPath();
            ctx.moveTo(557, 307);
            ctx.lineTo(667, 284);
            ctx.lineTo(724, 380);
            ctx.lineTo(650, 464);
            ctx.lineTo(548,420);
            ctx.closePath();
            ctx.fillStyle = "#ff00ff"
            ctx.fill();
            ctx.stroke();

            
            //5. Star
            ctx.beginPath();
            ctx.moveTo(635,496);
            ctx.lineTo(667,554);
            ctx.lineTo(733,567);
            ctx.lineTo(688,614);
            ctx.lineTo(695,680);
            ctx.lineTo(637,653);
            ctx.lineTo(634,653);
            ctx.lineTo(576,680);
            ctx.lineTo(582,622);
            ctx.lineTo(583,614);
            ctx.lineTo(538,567);
            ctx.lineTo(604,554);
            ctx.lineTo(635,496);
            ctx.closePath();
            ctx.fillStyle = "yellow";
            ctx.strokeStyle = "#202020";
            ctx.fill();
            ctx.stroke();


         </script>  


        </body>
    </head>
</html>
